# HTTP redirect
server {
    listen 80;
    server_name loki.phatngocanh.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — Loki push/query endpoint, protected by basic auth
server {
    listen 443 ssl;
    http2 on;
    server_name loki.phatngocanh.xyz;

    ssl_certificate /etc/letsencrypt/live/donhang.phatngocanh.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/donhang.phatngocanh.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Basic auth — credentials managed via nginx/auth/loki.htpasswd
    # Generate with: nginx/generate-auth.sh (reads log/.env)
    auth_basic "Loki";
    auth_basic_user_file /etc/nginx/auth/loki.htpasswd;

    location / {
        proxy_pass http://host.docker.internal:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Log shippers send large batches; don't buffer
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        access_log off;
        auth_basic off;
        proxy_pass http://host.docker.internal:3100/ready;
        proxy_set_header Host $host;
    }
}
