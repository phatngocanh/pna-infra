auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  grpc_server_max_recv_msg_size: 4194304   # 4MB
  grpc_server_max_send_msg_size: 4194304   # 4MB

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-03-20
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: tsdb_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-shipper-active
    cache_location: /loki/tsdb-shipper-cache
  aws:
    region: ${LOKI_S3_REGION}
    bucketnames: ${LOKI_S3_BUCKET}
    access_key_id: ${LOKI_S3_ACCESS_KEY_ID}
    secret_access_key: ${LOKI_S3_SECRET_ACCESS_KEY}
    s3forcepathstyle: false

limits_config:
  retention_period: 168h       # 7 days
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 30m

query_range:
  parallelise_shardable_queries: false

ingester:
  chunk_idle_period: 10m
  chunk_target_size: 1048576   # 1MB
  max_chunk_age: 2h
  chunk_retain_period: 30s

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: s3
